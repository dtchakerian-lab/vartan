name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# peaceiris pushes the built dist/ to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # npm 11 matches the lockfile generated locally (npm 10's npm ci can fail).
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Project site URL is /vartan/ — keep built files at gh-pages root.
          # User must set Settings → Pages → Deploy from branch → gh-pages / (root).
